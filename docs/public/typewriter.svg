<!-- https://github.com/DenverCoder1/readme-typing-svg/ -->
<svg xmlns='http://www.w3.org/2000/svg'
    xmlns:xlink='http://www.w3.org/1999/xlink'
    viewBox='0 0 600 48'
    style='background-color: #00000000;'
    width='600px' height='48px'>

    
                <path id='path0'>
                            <!-- Single line -->
                                <animate id='d0' attributeName='d' begin='0s;d5.end'
                    dur='5000ms' fill='remove'
                    values='m0,24 h0 ; m0,24 h600 ; m0,24 h600 ; m0,24 h0' keyTimes='0;0.64;0.84;1' />
                    </path>
    <text font-family='"Noto Serif Simplified Chinese", monospace' fill='#3451B2' font-size='40'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'
        letter-spacing='normal'>
        <textPath xlink:href='#path0'>
            春风若有怜花意，可否许我再少年
        </textPath>
    </text>
        <path id='path1'>
                            <!-- Single line -->
                                <animate id='d1' attributeName='d' begin='d0.end'
                    dur='5000ms' fill='remove'
                    values='m0,24 h0 ; m0,24 h600 ; m0,24 h600 ; m0,24 h0' keyTimes='0;0.64;0.84;1' />
                    </path>
    <text font-family='"Noto Serif Simplified Chinese", monospace' fill='#3451B2' font-size='40'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'
        letter-spacing='normal'>
        <textPath xlink:href='#path1'>
            欲买桂花同载酒，终不似，少年游
        </textPath>
    </text>
        <path id='path2'>
                            <!-- Single line -->
                                <animate id='d2' attributeName='d' begin='d1.end'
                    dur='5000ms' fill='remove'
                    values='m0,24 h0 ; m0,24 h600 ; m0,24 h600 ; m0,24 h0' keyTimes='0;0.64;0.84;1' />
                    </path>
    <text font-family='"Noto Serif Simplified Chinese", monospace' fill='#3451B2' font-size='40'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'
        letter-spacing='normal'>
        <textPath xlink:href='#path2'>
            醉后不知天在水，满船清梦压星河
        </textPath>
    </text>
        <path id='path3'>
                            <!-- Single line -->
                                <animate id='d3' attributeName='d' begin='d2.end'
                    dur='5000ms' fill='remove'
                    values='m0,24 h0 ; m0,24 h600 ; m0,24 h600 ; m0,24 h0' keyTimes='0;0.64;0.84;1' />
                    </path>
    <text font-family='"Noto Serif Simplified Chinese", monospace' fill='#3451B2' font-size='40'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'
        letter-spacing='normal'>
        <textPath xlink:href='#path3'>
            当时明月在，曾照彩云归
        </textPath>
    </text>
        <path id='path4'>
                            <!-- Single line -->
                                <animate id='d4' attributeName='d' begin='d3.end'
                    dur='5000ms' fill='remove'
                    values='m0,24 h0 ; m0,24 h600 ; m0,24 h600 ; m0,24 h0' keyTimes='0;0.64;0.84;1' />
                    </path>
    <text font-family='"Noto Serif Simplified Chinese", monospace' fill='#3451B2' font-size='40'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'
        letter-spacing='normal'>
        <textPath xlink:href='#path4'>
            人生若只如初见，何事秋风悲画扇
        </textPath>
    </text>
        <path id='path5'>
                            <!-- Single line -->
                                <animate id='d5' attributeName='d' begin='d4.end'
                    dur='5000ms' fill='remove'
                    values='m0,24 h0 ; m0,24 h600 ; m0,24 h600 ; m0,24 h0' keyTimes='0;0.64;0.84;1' />
                    </path>
    <text font-family='"Noto Serif Simplified Chinese", monospace' fill='#3451B2' font-size='40'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'
        letter-spacing='normal'>
        <textPath xlink:href='#path5'>
            桃李春风一杯酒，江湖夜雨十年灯
        </textPath>
    </text>
</svg>
